# Propiedades de Spring Boot directas para aislar el entorno de Test
server.port=8081

# Configuración falsa de PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sanos_test
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.postgresql.Driver

# TRUCO MÁGICO: Evita la conexión real
spring.datasource.hikari.initialization-fail-timeout=-1

# Le decimos explícitamente a Hibernate qué dialecto usar para que no intente adivinarlo
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
spring.jpa.hibernate.ddl-auto=none

# APIs simuladas
locationiq.api.key=test-api-key
locationiq.api.url=https://us1.locationiq.com/v1/search.php