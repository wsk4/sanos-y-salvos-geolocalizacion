# SERVER
server.port=${SERVER_PORT}
spring.application.name=geolocalizacion

# db
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# control de peticiones a db
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# JPA & POSTGIS — Hibernate 6 (Spring Boot 3.x)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# locationiq
locationiq.api.key=${LOCATIONIQ_API_KEY}
locationiq.api.url=${LOCATIONIQ_API_URL:https://us1.locationiq.com/v1/search.php}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Circuit Breaker
resilience4j.circuitbreaker.instances.locationIqCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.locationIqCB.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.locationIqCB.sliding-window-size=5