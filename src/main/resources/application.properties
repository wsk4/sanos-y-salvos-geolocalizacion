# SERVER & APP CONFIGURATION
server.port=${SERVER_PORT}
spring.application.name=geolocalizacion

# DATABASE
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARI POOL (Senior Config: Fixed Size)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# JPA & POSTGIS
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# EXTERNAL API
locationiq.api.key=${LOCATIONIQ_API_KEY}
locationiq.api.url=${LOCATIONIQ_API_URL:https://us1.locationiq.com/v1/search.php}

# OBSERVABILITY
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always